<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="50%" stop-color="#fd79a8"/>
      <stop offset="100%" stop-color="#fdcb6e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Piggy bank body -->
  <ellipse cx="16" cy="18" rx="9" ry="7" fill="#fab1a0"/>
  <!-- Ear -->
  <ellipse cx="10" cy="12" rx="3" ry="2.5" fill="#e17055" transform="rotate(-15 10 12)"/>
  <ellipse cx="10.5" cy="12" rx="1.8" ry="1.5" fill="#fab1a0" transform="rotate(-15 10.5 12)"/>
  <!-- Coin slot -->
  <rect x="13.5" y="10.5" width="5" height="1.5" rx="0.75" fill="#fdcb6e"/>
  <!-- Eye -->
  <circle cx="12.5" cy="16" r="1.2" fill="#2d3436"/>
  <circle cx="12" cy="15.5" r="0.4" fill="#fff"/>
  <!-- Snout -->
  <ellipse cx="21" cy="18" rx="3.5" ry="2.8" fill="#e17055"/>
  <circle cx="20" cy="17.5" r="0.6" fill="#c0392b"/>
  <circle cx="22" cy="17.5" r="0.6" fill="#c0392b"/>
  <!-- Legs -->
  <rect x="10" y="23" width="2.5" height="3" rx="1.25" fill="#e17055"/>
  <rect x="19" y="23" width="2.5" height="3" rx="1.25" fill="#e17055"/>
  <!-- Tail curl -->
  <path d="M7 16 Q4 14 5 11" stroke="#e17055" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
