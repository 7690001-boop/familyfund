name = "yahoo-proxy"
main = "worker.js"
compatibility_date = "2025-01-01"

# All secrets set via: wrangler secret put NAME
#   FIREBASE_API_KEY
#   FIREBASE_PROJECT_ID
#   ALLOWED_ORIGIN
#   FIREBASE_SA_EMAIL
#   FIREBASE_SA_PRIVATE_KEY

# KV namespace for brute-force rate limiting on /login
# Setup: wrangler kv namespace create "RATE_LIMIT"
# Then replace the id below with the returned namespace ID.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "e2f53eaaa07e4db5812a98d56ecbe52d"

[observability]
enabled = true
